name: Weekly Insider Signals

on:
  schedule:
    - cron: '0 1 * * 1'   # Every Monday 1am UTC (8am Bangkok)
  workflow_dispatch:        # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch PEAD signals
        id: fetch_pead
        env:
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        run: python pead_signals_fetcher.py
        continue-on-error: true  # PEAD failure doesn't block insider signals

      - name: Fetch insider & politician signals (attempt 1)
        id: fetch_attempt_1
        env:
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        run: python insider_signals_fetcher.py
        continue-on-error: true

      - name: Wait and retry if attempt 1 failed
        if: steps.fetch_attempt_1.outcome == 'failure'
        run: |
          echo "Attempt 1 failed — waiting 60s before retry..."
          sleep 60

      - name: Fetch insider & politician signals (attempt 2)
        id: fetch_attempt_2
        if: steps.fetch_attempt_1.outcome == 'failure'
        env:
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        run: python insider_signals_fetcher.py
        continue-on-error: true

      - name: Wait and retry if attempt 2 failed
        if: steps.fetch_attempt_2.outcome == 'failure'
        run: |
          echo "Attempt 2 failed — waiting 120s before final retry..."
          sleep 120

      - name: Fetch insider & politician signals (attempt 3 — final)
        id: fetch_attempt_3
        if: steps.fetch_attempt_2.outcome == 'failure'
        env:
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        run: python insider_signals_fetcher.py
        continue-on-error: true

      - name: Write failure marker if no JSON produced
        if: ${{ !hashFiles('insider_signals.json') }}
        run: |
          python3 -c "import json,datetime; json.dump({'health':{'timestamp':datetime.datetime.now().strftime('%Y-%m-%d %H:%M UTC'),'insider_fetch_ok':False,'politician_fetch_ok':False,'retry_required':True,'retry_reason':['all_attempts_failed'],'n_insider_signals':0,'n_politician_signals':0,'n_combined_signals':0},'signals':{}},open('insider_signals.json','w'),indent=2)"
          echo "FETCH_INCOMPLETE=true" >> $GITHUB_ENV

      - name: Check retry status from JSON
        if: hashFiles('insider_signals.json')
        run: |
          RETRY=$(python3 -c "import json; d=json.load(open('insider_signals.json')); print(d['health']['retry_required'])")
          echo "retry_required=$RETRY"
          if [ "$RETRY" = "True" ]; then
            echo "::warning::Insider signals fetch incomplete after 3 attempts — manual re-run required"
            echo "FETCH_INCOMPLETE=true" >> $GITHUB_ENV
          else
            echo "FETCH_INCOMPLETE=false" >> $GITHUB_ENV
          fi

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add insider_signals.json pead_signals.json
          if [ "$FETCH_INCOMPLETE" = "true" ]; then
            git diff --staged --quiet || git commit -m "warn: insider signals incomplete $(date -u '+%Y-%m-%d') — retry required"
          else
            git diff --staged --quiet || git commit -m "chore: insider signals update $(date -u '+%Y-%m-%d') UTC"
          fi
          git pull --rebase origin main
          git push

      # NOTE: No Netlify deploy hook — dashboard fetches JSON directly from GitHub API.
      # Netlify only needs to redeploy when index.html changes.

      - name: Fail job if fetch incomplete
        if: env.FETCH_INCOMPLETE == 'true'
        run: |
          echo "::error::Insider signals fetch failed. Go to Actions → Weekly Insider Signals → Re-run jobs"
          exit 1
