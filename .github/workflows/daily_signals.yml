name: Daily Signal Scanner

on:
  schedule:
    - cron: '0 23 * * 1-5'   # 6:00 AM Bangkok (UTC+7)
    - cron: '0 13 * * 1-5'   # 8:00 PM Bangkok (UTC+7)
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-github-actions.txt

      - name: Log validated params in use
        run: |
          if [ -f validated_params.json ]; then
            echo "Using validated params:"
            python -c "import json; p=json.load(open('validated_params.json')); print(f'  Generated: {p[\"generated_at\"]}'); print(f'  Params: {p[\"optimal_params\"]}'); print(f'  Buy weights: {p[\"buy_weights\"]}')"
          else
            echo "No validated_params.json found — scanner will use defaults"
          fi

      - name: Run signal scanner
        env:
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        run: python signal_scanner.py

      - name: Commit signals_payload.json
        run: |
          git config user.name  "Signal Bot"
          git config user.email "bot@portfolio-signals"
          git add signals_payload.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: signals update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
