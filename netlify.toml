# Static site — no build step needed.
# Python runs on GitHub Actions only, not here.
[build]
  publish = "."
  command = "echo 'No build needed'"
  ignore = "exit 1"

[build.environment]
  PYTHON_VERSION = "3.12"

[[headers]]
  for = "/signals_payload.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/validated_params.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/validation_report.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
